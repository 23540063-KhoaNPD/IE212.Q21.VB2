version: '3.9'

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka_kraft
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CLUSTER_ID: qtU4eS69RE6uCcIn_L6Yvg
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      retries: 12

  producer:
      image: apache/spark:3.5.0  # Đổi từ python:3.10 sang spark
      container_name: kafka_producer
      user: root # Cần quyền root để cài pip requirements
      depends_on:
        kafka:
          condition: service_healthy
      volumes:
        - ./producer.py:/app/producer.py
        - ./data:/app/data
        - ./requirements.txt:/app/requirements.txt
      working_dir: /app
      command: >
        sh -c "
        pip install -r requirements.txt &&
        /opt/spark/bin/spark-submit 
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 
        /app/producer.py
        "

  spark:
    image: apache/spark:3.5.0
    container_name: spark_consumer
    user: root
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./consumer.py:/app/consumer.py
      - ./requirements.txt:/app/requirements.txt
      - spark_ivy:/home/spark/.ivy2
    working_dir: /app
    command: >
      sh -c "
      pip install -r requirements.txt &&
      mkdir -p /home/spark/.ivy2/cache &&
      chmod -R 777 /home/spark/.ivy2 &&
      /opt/spark/bin/spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
      /app/consumer.py
      "

volumes:
  spark_ivy: